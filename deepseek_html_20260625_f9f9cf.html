                    e.preventDefault();
                    showContextMenu(e.clientX, e.clientY, [
                        { label: 'New Folder', action: () => { openApp('finder');
                                showNotification('Finder',
                                    'Create a new folder in Finder'); } },
                        { label: 'New Note', action: () => openApp('notes') },
                        { label: 'Change Wallpaper', action: () => openApp('settings') },
                        { divider: true },
                        { label: 'Refresh Desktop', action: () => { renderDesktopIcons();
                                showNotification('Desktop', 'Refreshed'); } },
                    ]);
                });
            }

            function showContextMenu(x, y, items) {
                $contextMenu.innerHTML = items.map(item => {
                    if (item.divider) return '<div class="context-menu-divider"></div>';
                    return `<div class="context-menu-item">${item.label}</div>`;
                }).join('');
                $contextMenu.style.left = Math.min(x, window.innerWidth - 200) + 'px';
                $contextMenu.style.top = Math.min(y, window.innerHeight - 200) + 'px';
                $contextMenu.classList.add('show');
                const menuItems = $contextMenu.querySelectorAll('.context-menu-item');
                menuItems.forEach((el, i) => {
                    const item = items.filter(it => !it.divider)[i];
                    if (item) el.addEventListener('click', () => { item.action();
                        $contextMenu.classList.remove('show'); });
                });
            }

            // ──────────────────────────────────────
            // KEYBOARD SHORTCUTS
            // ──────────────────────────────────────
            function initKeyboardShortcuts() {
                document.addEventListener('keydown', (e) => {
                    const isCmd = e.metaKey || e.ctrlKey;
                    if (isCmd && e.key === ' ' && !e.repeat) {
                        e.preventDefault();
                        openSpotlight();
                    }
                    if (isCmd && e.key === 'n' && !e.repeat) {
                        e.preventDefault();
                        openApp('finder');
                    }
                    if (isCmd && e.key === 'w' && !e.repeat) {
                        e.preventDefault();
                        if (state.activeWindowId) closeWindow(state.activeWindowId);
                    }
                    if (isCmd && e.key === 'm' && !e.repeat) {
                        e.preventDefault();
                        if (state.activeWindowId) minimizeWindow(state.activeWindowId);
                    }
                    if (isCmd && e.key === 'f' && !e.repeat) {
                        e.preventDefault();
                        openSpotlight();
                    }
                    if (e.key === 'Escape') {
                        closeSpotlight();
                        $controlCenter.classList.remove('open');
                        document.getElementById('control-center-overlay').classList.remove('active');
                        $notificationCenter.classList.remove('open');
                        $contextMenu.classList.remove('show');
                    }
                });
            }

            // ──────────────────────────────────────
            // MULTIPLAYER (MOCK)
            // ──────────────────────────────────────
            function initMultiplayer() {
                // Mock WebSocket server simulation
                const mockServer = {
                    clients: [],
                    broadcast(msg) {
                        this.clients.forEach(c => c.onMessage(JSON.parse(msg)));
                    },
                    addClient(client) {
                        this.clients.push(client);
                        client.onMessage({ type: 'connected', userId: 'user-' + this.clients.length,
                            users: this.clients.map(c => c.userId) });
                        this.broadcast(JSON.stringify({ type: 'user-joined', userId: client.userId, users: this
                                .clients.map(c => c.userId) }));
                    },
                };
                const localClient = {
                    userId: 'user-local',
                    onMessage(data) {
                        if (data.type === 'user-joined' && data.userId !== 'user-local') {
                            state.multiplayerUsers = data.users || [];
                            showNotification('Multiplayer', data.userId + ' joined the session', 'info');
                        }
                        if (data.type === 'cursor-move' && data.userId !== 'user-local') {
                            state.multiplayerCursors[data.userId] = { x: data.x, y: data.y };
                            updateRemoteCursors();
                        }
                    },
                    send(data) {
                        mockServer.broadcast(JSON.stringify({ ...data, userId: this.userId }));
                    },
                };
                mockServer.addClient(localClient);
                // Simulate another user joining after a delay
                setTimeout(() => {
                    const remoteClient = {
                        userId: 'user-remote-1',
                        onMessage(data) { /* remote handling */ },
                    };
                    mockServer.addClient(remoteClient);
                    state.multiplayerUsers = mockServer.clients.map(c => c.userId);
                }, 5000);

                // Track local cursor for multiplayer
                document.addEventListener('mousemove', (e) => {
                    if (state.multiplayerUsers.length > 1) {
                        localClient.send({ type: 'cursor-move', x: e.clientX, y: e.clientY });
                    }
                });
            }

            function updateRemoteCursors() {
                // Remove old remote cursors
                document.querySelectorAll('.remote-cursor').forEach(el => el.remove());
                Object.entries(state.multiplayerCursors).forEach(([userId, pos]) => {
                    const cursor = document.createElement('div');
                    cursor.className = 'remote-cursor';
                    cursor.style.cssText = `
              position:fixed;left:${pos.x}px;top:${pos.y}px;width:12px;height:12px;
              border-radius:50%;background:#ff6b6b;z-index:400;pointer-events:none;
              box-shadow:0 0 8px rgba(255,107,107,0.6);transition:left 0.1s,top 0.1s;
            `;
                    cursor.title = userId;
                    document.body.appendChild(cursor);
                });
            }

            // ──────────────────────────────────────
            // APPLE MENU
            // ──────────────────────────────────────
            document.getElementById('apple-menu-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                const rect = e.target.getBoundingClientRect();
                showContextMenu(rect.left, rect.bottom, [
                    { label: 'About This Mac', action: () => showNotification('About',
                            'macOS Simulator v1.0', 'info') },
                    { label: 'System Preferences', action: () => openApp('settings') },
                    { divider: true },
                    { label: 'Restart', action: () => { location.reload(); } },
                    { label: 'Shut Down', action: () => { document.body.innerHTML =
                                '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#000;color:#fff;font-size:24px;">Shutting Down...</div>'; } },
                ]);
            });

            // ──────────────────────────────────────
            // STARTUP
            // ──────────────────────────────────────
            simulateBoot();
            // Expose for debugging
            window.macOSState = state;
            window.macOS = {
                openApp,
                closeWindow,
                showNotification,
                state,
            };
            console.log('🍎 macOS Simulator ready. Try: openApp("finder"), openApp("notes"), openApp("calculator")');
            console.log('Keyboard shortcuts: Cmd+Space = Spotlight, Cmd+N = Finder, Cmd+W = Close, Esc = Dismiss');
        })();
    </script>
</body>
</html>
